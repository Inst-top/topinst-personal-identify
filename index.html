  <style>
/* ============ Personal Identify — Design System ============ */
/* Brand: Thaioil — corporate blue + magenta accent, warm friendly neutrals */

:root {
  /* Brand */
  --blue:        #1d4f91;
  --blue-700:    #173f74;
  --blue-900:    #0f2c52;
  --blue-50:     #eef3fb;
  --blue-100:    #dbe6f6;
  --magenta:     #e3197f;
  --magenta-600: #c5126c;
  --magenta-50:  #fdeaf3;
  --amber:       #e8a33d;

  /* Warm neutrals */
  --bg:        #f7f4f0;
  --surface:   #ffffff;
  --surface-2: #fbf9f6;
  --ink:       #2a2521;
  --ink-2:     #5d564f;
  --muted:     #948b81;
  --line:      #ece6de;
  --line-2:    #e0d8cd;

  /* Status */
  --green:  #2f8a5b;
  --green-50: #e7f4ec;
  --red:    #c0492f;

  /* Tunable via Tweaks */
  --radius: 14px;
  --gap:    20px;     /* density base */

  --r-sm: calc(var(--radius) * 0.5);
  --r-lg: calc(var(--radius) * 1.35);
  --r-pill: 999px;

  --shadow-sm: 0 1px 2px rgba(28,22,15,.06), 0 1px 3px rgba(28,22,15,.05);
  --shadow:    0 2px 6px rgba(28,22,15,.06), 0 8px 24px rgba(28,22,15,.07);
  --shadow-lg: 0 12px 40px rgba(28,22,15,.14);

  --font-ui: 'IBM Plex Sans Thai', 'Sarabun', system-ui, sans-serif;
  --font-cv: 'Sarabun', 'IBM Plex Sans Thai', system-ui, sans-serif;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-ui);
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
button { font-family: inherit; cursor: pointer; }
input, textarea, select { font-family: inherit; }
::selection { background: var(--magenta-50); }

/* ---- App shell ---- */
.app { display: flex; min-height: 100vh; }

.sidebar {
  width: 248px; flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--line);
  display: flex; flex-direction: column;
  position: sticky; top: 0; height: 100vh;
}
.sidebar__logo {
  padding: 22px 22px 16px;
  display: flex; align-items: center; gap: 10px;
}
.sidebar__logo img { height: 30px; width: auto; }
.brandmark { display: flex; flex-direction: column; line-height: 1.05; }
.brandmark b { font-size: 14px; font-weight: 700; letter-spacing: -.01em; }
.brandmark span { font-size: 10.5px; color: var(--muted); letter-spacing: .04em; }

.nav { padding: 8px 12px; display: flex; flex-direction: column; gap: 2px; flex: 1; }
.nav__label { font-size: 10.5px; font-weight: 600; letter-spacing: .08em;
  color: var(--muted); text-transform: uppercase; padding: 14px 10px 6px; }
.nav__item {
  display: flex; align-items: center; gap: 11px;
  padding: 10px 12px; border-radius: var(--r-sm);
  color: var(--ink-2); font-size: 14px; font-weight: 500;
  border: none; background: none; text-align: left; width: 100%;
  transition: background .14s, color .14s;
}
.nav__item:hover { background: var(--surface-2); color: var(--ink); }
.nav__item.is-active { background: var(--blue-50); color: var(--blue); font-weight: 600; }
.nav__item.is-active svg { color: var(--blue); }
.nav__item svg { width: 18px; height: 18px; flex-shrink: 0; color: var(--muted); }

.sidebar__user {
  margin: 8px 12px 16px; padding: 12px; border-radius: var(--radius);
  background: var(--surface-2); border: 1px solid var(--line);
  display: flex; align-items: center; gap: 10px;
}

/* ---- Main column ---- */
.main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.topbar {
  height: 64px; flex-shrink: 0; background: var(--surface);
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; gap: 16px;
  padding: 0 28px; position: sticky; top: 0; z-index: 20;
}
.topbar h1 { font-size: 18px; font-weight: 700; margin: 0; letter-spacing: -.01em; white-space: nowrap; }
.topbar__sub { font-size: 13px; color: var(--muted); }
.content { padding: 28px; max-width: 1240px; width: 100%; margin: 0 auto; }

/* ---- Cards ---- */
.card {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--radius); box-shadow: var(--shadow-sm);
}
.card__head {
  padding: 16px 20px; border-bottom: 1px solid var(--line);
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.card__head h3 { margin: 0; font-size: 15px; font-weight: 700; }
.card__body { padding: 20px; }

/* ---- Buttons ---- */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 10px 16px; border-radius: var(--r-pill); font-size: 13.5px; font-weight: 600;
  border: 1px solid transparent; transition: all .14s; white-space: nowrap;
}
.btn svg { width: 16px; height: 16px; }
.btn--primary { background: var(--blue); color: #fff; }
.btn--primary:hover { background: var(--blue-700); box-shadow: var(--shadow); }
.btn--magenta { background: var(--magenta); color: #fff; }
.btn--magenta:hover { background: var(--magenta-600); box-shadow: var(--shadow); }
.btn--ghost { background: var(--surface); color: var(--ink-2); border-color: var(--line-2); }
.btn--ghost:hover { background: var(--surface-2); color: var(--ink); border-color: var(--muted); }
.btn--soft { background: var(--blue-50); color: var(--blue); }
.btn--soft:hover { background: var(--blue-100); }
.btn--sm { padding: 7px 12px; font-size: 12.5px; }
.btn--lg { padding: 13px 22px; font-size: 15px; }
.btn:disabled { opacity: .5; cursor: not-allowed; }

.iconbtn {
  width: 34px; height: 34px; display: inline-flex; align-items: center; justify-content: center;
  border-radius: var(--r-sm); border: 1px solid var(--line-2); background: var(--surface);
  color: var(--ink-2); transition: all .14s;
}
.iconbtn:hover { background: var(--surface-2); color: var(--ink); }
.iconbtn svg { width: 16px; height: 16px; }
.iconbtn--danger:hover { background: #fbeae6; color: var(--red); border-color: #efc4ba; }

/* ---- Tags / chips ---- */
.tag {
  display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
  padding: 4px 11px; border-radius: var(--r-pill);
  font-size: 12.5px; font-weight: 600; line-height: 1.4;
}
.tag--blue { background: var(--blue-50); color: var(--blue); }
.tag--magenta { background: var(--magenta-50); color: var(--magenta-600); }
.tag--neutral { background: var(--surface-2); color: var(--ink-2); border: 1px solid var(--line); }
.tag--green { background: var(--green-50); color: var(--green); }
.tag--amber { background: #fbf0db; color: #9a6b18; }

/* ---- Avatar ---- */
.avatar {
  border-radius: 50%; object-fit: cover; flex-shrink: 0;
  background: var(--blue-50); display: inline-flex; align-items: center; justify-content: center;
  color: var(--blue); font-weight: 700; overflow: hidden;
}

/* ---- Forms ---- */
.field { display: flex; flex-direction: column; gap: 6px; }
.field > label { font-size: 12.5px; font-weight: 600; color: var(--ink-2); }
.field .hint { font-size: 11.5px; color: var(--muted); font-weight: 400; }
.input, .textarea, .select {
  width: 100%; padding: 10px 13px; border-radius: var(--r-sm);
  border: 1px solid var(--line-2); background: var(--surface); color: var(--ink);
  font-size: 14px; transition: border .14s, box-shadow .14s;
}
.input:focus, .textarea:focus, .select:focus {
  outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-50);
}
.textarea { resize: vertical; min-height: 78px; line-height: 1.55; }
.field-grid { display: grid; gap: 16px; grid-template-columns: repeat(2, 1fr); }
.field-grid--3 { grid-template-columns: repeat(3, 1fr); }
.field-grid--4 { grid-template-columns: repeat(4, 1fr); }
@media (max-width: 720px){ .field-grid, .field-grid--3, .field-grid--4 { grid-template-columns: 1fr; } }

/* ---- Repeatable rows ---- */
.repeat-row {
  background: var(--surface-2); border: 1px solid var(--line);
  border-radius: var(--radius); padding: 16px; position: relative;
}
.repeat-row + .repeat-row { margin-top: 12px; }
.repeat-row__num {
  position: absolute; top: -10px; left: 14px;
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--blue); color: #fff; font-size: 11.5px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}
.repeat-row__del { position: absolute; top: 12px; right: 12px; }

.tagline { display: flex; flex-wrap: wrap; gap: 8px; }
.tag-input {
  background: var(--surface-2); border: 1px dashed var(--line-2);
  border-radius: var(--radius); padding: 12px;
}

.addbtn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 9px 14px; border-radius: var(--r-pill);
  background: var(--surface); border: 1.5px dashed var(--line-2);
  color: var(--blue); font-size: 13px; font-weight: 600; transition: all .14s;
}
.addbtn:hover { border-color: var(--blue); background: var(--blue-50); }
.addbtn:disabled { color: var(--muted); border-color: var(--line); background: var(--surface); cursor: not-allowed; }
.addbtn svg { width: 15px; height: 15px; }

.section-title {
  display: flex; align-items: center; gap: 10px;
  font-size: 15px; font-weight: 700; margin: 0 0 4px;
}
.section-title .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--magenta); }
.section-sub { font-size: 12.5px; color: var(--muted); margin: 0 0 16px; }

.divider { height: 1px; background: var(--line); border: none; margin: 24px 0; }

/* ---- Stat tiles ---- */
.stat {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--radius); padding: 18px 18px 16px; box-shadow: var(--shadow-sm);
}
.stat__val { font-size: 30px; font-weight: 800; letter-spacing: -.02em; line-height: 1; }
.stat__label { font-size: 12.5px; color: var(--muted); margin-top: 8px; font-weight: 500; }
.stat__ico { width: 38px; height: 38px; border-radius: var(--r-sm); display: flex;
  align-items: center; justify-content: center; margin-bottom: 14px; }

/* ---- Bars (dept distribution) ---- */
.bar-row { display: grid; grid-template-columns: 130px 1fr 42px; align-items: center; gap: 12px; padding: 7px 0; }
.bar-row__name { font-size: 13px; color: var(--ink-2); font-weight: 500; }
.bar-track { display: block; height: 10px; background: var(--surface-2); border-radius: var(--r-pill); overflow: hidden; }
.bar-fill { display: block; height: 100%; border-radius: var(--r-pill); background: linear-gradient(90deg, var(--blue), #3a72c4); }
.bar-row__val { font-size: 13px; font-weight: 700; text-align: right; }

/* ---- Pending (not-yet-filled) list ---- */
.pending-row {
  display: flex; align-items: center; gap: 13px; width: 100%;
  padding: 13px 18px; background: var(--surface); border: none; cursor: pointer;
  text-align: left; font-family: inherit; color: var(--ink); transition: background .12s;
}
.pending-row:hover { background: var(--surface-2); }

/* ---- Employee list ---- */
.emp-grid { display: grid; gap: 14px; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
.emp-card {
  background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
  padding: 18px; cursor: pointer; transition: all .15s; box-shadow: var(--shadow-sm);
  display: flex; flex-direction: column; gap: 14px;
}
.emp-card:hover { border-color: var(--blue-100); box-shadow: var(--shadow); transform: translateY(-2px); }
.emp-card__top { display: flex; gap: 13px; align-items: center; }
.emp-card__name { font-size: 15px; font-weight: 700; line-height: 1.25; }
.emp-card__role { font-size: 12.5px; color: var(--muted); margin-top: 2px; }
.emp-card__pos { font-size: 12px; color: var(--ink-2); font-weight: 500; line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; min-height: 33px; }
.emp-card__meta { display: flex; gap: 8px; flex-wrap: wrap; }

.toolbar { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 20px; }
.search {
  flex: 1; min-width: 220px; position: relative;
}
.search input { width: 100%; padding: 11px 14px 11px 40px; border-radius: var(--r-pill);
  border: 1px solid var(--line-2); background: var(--surface); font-size: 14px; }
.search input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-50); }
.search svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 17px; height: 17px; color: var(--muted); }

/* ---- Profile read view ---- */
.profile-hero {
  border-radius: var(--r-lg); overflow: hidden; box-shadow: var(--shadow-sm);
  border: 1px solid var(--line); background: var(--surface);
}
.profile-hero__band {
  background: linear-gradient(115deg, var(--blue-900), var(--blue) 62%, #2f6bb5);
  height: 96px; position: relative;
}
.profile-hero__band::after {
  content: ''; position: absolute; right: 0; top: 0; bottom: 0; width: 42%;
  background: linear-gradient(115deg, transparent, var(--magenta) 240%);
  opacity: .38; clip-path: polygon(28% 0, 100% 0, 100% 100%, 0% 100%);
}
.profile-hero__body { padding: 16px 28px 24px; display: flex; gap: 22px; align-items: flex-end; position: relative; }
.profile-hero__ava { border: 4px solid var(--surface); box-shadow: var(--shadow); margin-top: -58px; }
.profile-hero__info { padding-bottom: 4px; flex: 1; }
.profile-hero__info h2 { margin: 0; font-size: 24px; font-weight: 800; letter-spacing: -.02em; }
.profile-hero__info .pos { font-size: 14.5px; color: var(--blue); font-weight: 600; margin-top: 3px; }
.profile-hero__chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
.profile-hero__actions { display: flex; gap: 10px; padding-bottom: 6px; flex-wrap: wrap; }

.read-grid { display: grid; grid-template-columns: 1.6fr 1fr; gap: 20px; margin-top: 20px; align-items: start; }
@media (max-width: 940px){ .read-grid { grid-template-columns: 1fr; } }
.kv { display: grid; grid-template-columns: 150px 1fr; gap: 6px 14px; font-size: 14px; }
.kv dt { color: var(--muted); font-weight: 500; }
.kv dd { margin: 0; font-weight: 600; }

.timeline { position: relative; padding-left: 26px; }
.timeline::before { content: ''; position: absolute; left: 6px; top: 6px; bottom: 6px; width: 2px; background: var(--line-2); }
.tl-item { position: relative; padding-bottom: 22px; }
.tl-item:last-child { padding-bottom: 0; }
.tl-item::before { content: ''; position: absolute; left: -26px; top: 4px; width: 13px; height: 13px;
  border-radius: 50%; background: var(--surface); border: 3px solid var(--blue); }
.tl-item__period { font-size: 12px; color: var(--magenta-600); font-weight: 700; letter-spacing: .01em; }
.tl-item__co { font-size: 15px; font-weight: 700; margin: 2px 0 0; }
.tl-item__pos { font-size: 13px; color: var(--ink-2); font-weight: 600; }
.tl-item ul { margin: 8px 0 0; padding-left: 18px; }
.tl-item li { font-size: 13px; color: var(--ink-2); margin-bottom: 4px; line-height: 1.5; }

.bullet-list { margin: 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 9px; }
.bullet-list li { display: flex; gap: 10px; font-size: 13.5px; line-height: 1.5; color: var(--ink-2); }
.bullet-list li::before { content: ''; flex-shrink: 0; width: 7px; height: 7px; margin-top: 6px;
  border-radius: 2px; background: var(--magenta); transform: rotate(45deg); }

/* ---- Login ---- */
.login-wrap { min-height: 100vh; display: grid; grid-template-columns: 1.05fr 1fr; }
@media (max-width: 880px){ .login-wrap { grid-template-columns: 1fr; } .login-art { display: none; } }
.login-art {
  background: linear-gradient(135deg, #ffffff 0%, #eef3fa 30%, var(--blue) 100%);
  position: relative; overflow: hidden; color: #fff;
  display: flex; flex-direction: column; justify-content: space-between; padding: 48px;
}
.login-art::before {
  content: ''; position: absolute; right: -80px; top: -60px; width: 460px; height: 460px;
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.18), transparent 62%); opacity: .5;
}
.login-art::after {
  content: ''; position: absolute; left: -120px; bottom: -120px; width: 380px; height: 380px;
  background: radial-gradient(circle, rgba(255,255,255,.10), transparent 65%);
}
.login-art__logo { align-self: flex-start; position: relative; z-index: 2; }
.login-art__logo img { height: 42px; display: block; }
.login-art__copy { position: relative; z-index: 2; flex: 1; display: flex; flex-direction: column; justify-content: center; }
.login-art__copy h2 { font-size: 40px; font-weight: 800; letter-spacing: -.02em; margin: 0; line-height: 1.12; color: var(--blue-900); }
.login-art__copy p { font-size: 15px; opacity: .85; line-height: 1.6; max-width: 380px; }
.login-art__feat { position: relative; z-index: 2; display: flex; flex-direction: column; gap: 14px; }
.login-art__feat div { display: flex; gap: 12px; align-items: center; font-size: 14px; opacity: .92; }
.login-art__feat svg { width: 20px; height: 20px; flex-shrink: 0; }

.login-panel { display: flex; align-items: center; justify-content: center; padding: 40px; background: var(--bg); }
.login-box { width: 100%; max-width: 380px; }
.login-box h1 { font-size: 24px; font-weight: 800; margin: 0 0 6px; letter-spacing: -.02em; }
.login-box .sub { font-size: 14px; color: var(--muted); margin: 0 0 26px; }
.tabs { display: flex; gap: 6px; background: var(--surface-2); border: 1px solid var(--line);
  padding: 5px; border-radius: var(--r-pill); margin-bottom: 24px; }
.tabs button { flex: 1; padding: 9px; border-radius: var(--r-pill); border: none; background: none;
  font-size: 13.5px; font-weight: 600; color: var(--ink-2); transition: all .14s; }
.tabs button.is-active { background: var(--surface); color: var(--blue); box-shadow: var(--shadow-sm); }
.login-box .field { margin-bottom: 16px; }
.demo-hint { margin-top: 18px; padding: 13px 14px; border-radius: var(--radius);
  background: var(--blue-50); font-size: 12.5px; color: var(--blue-700); line-height: 1.6; }
.demo-hint b { color: var(--blue); }
.demo-chip { display: inline-block; background: var(--surface); border: 1px solid var(--blue-100);
  border-radius: 6px; padding: 1px 7px; font-family: ui-monospace, monospace; font-size: 11.5px; cursor: pointer; }

/* ---- Empty state ---- */
.empty { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty svg { width: 46px; height: 46px; margin-bottom: 14px; color: var(--line-2); }

/* ---- Misc ---- */
.row { display: flex; align-items: center; gap: 12px; }
.between { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.wrap { flex-wrap: wrap; }
.grow { flex: 1; }
.muted { color: var(--muted); }
.stack { display: flex; flex-direction: column; }
.cards-gap { display: grid; gap: 20px; }

/* density */
.dense .content { padding: 18px; }
.dense .card__body { padding: 14px; }
.dense .repeat-row { padding: 12px; }
.comfy .card__body { padding: 26px; }
.comfy .content { padding: 36px; }

/* toast */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--ink); color: #fff; padding: 12px 20px; border-radius: var(--r-pill);
  font-size: 13.5px; font-weight: 600; box-shadow: var(--shadow-lg); z-index: 200;
  opacity: 0; pointer-events: none; transition: all .25s; display: flex; align-items: center; gap: 9px;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast svg { width: 17px; height: 17px; color: #6ee7a8; }

  <style>
/* ============ CV document + print styles ============ */
.cv-page {
  font-family: var(--font-cv);
  width: 210mm; min-height: 297mm;
  margin: 0 auto; background: #fff; color: #1f1b17;
  box-shadow: var(--shadow-lg);
  position: relative; overflow: visible;
}

/* header band */
.cv-head {
  background: linear-gradient(135deg, var(--blue-900) 0%, var(--blue) 100%);
  color: #fff; padding: 26px 30px; display: flex; flex-direction: row; align-items: flex-start; gap: 22px;
  position: relative; overflow: hidden;
}
.cv-head__top { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; position: relative; z-index: 2; }
.cv-head__body { display: flex; align-items: center; gap: 22px; position: relative; z-index: 2; }
.cv-head::after {
  content: ''; position: absolute; right: -40px; top: -60px; width: 300px; height: 300px;
  background: radial-gradient(circle at 30% 40%, rgba(255,255,255,.12), transparent 60%); opacity: .5;
}
.cv-photo {
  width: 96px; height: 96px; border-radius: 14px; object-fit: cover;
  border: 3px solid rgba(255,255,255,.55); flex-shrink: 0; position: relative; z-index: 2;
}
.cv-photo--ph { background: rgba(255,255,255,.16); display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,.7); }
.cv-head__main { flex: 1; position: relative; z-index: 2; }
.cv-head__th { margin: 3px 0 0; font-size: 14.5px; font-weight: 600; opacity: .95; }
.cv-head__pos { color: #ffd9ec !important; font-weight: 600 !important; }

.cv-head__line { font-size: 12.5px; line-height: 1.45; opacity: .94; overflow-wrap: anywhere; }
.cv-head__main h1 { margin: 0; font-size: 26px; font-weight: 800; letter-spacing: -.01em; }
.cv-head__id { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: flex-end; gap: 12px; }

.cv-head__idbox { text-align: right; }
.cv-head__idbox span { display: block; font-size: 9px; letter-spacing: .14em; opacity: .7; font-weight: 600; }

.cv-body { padding: 24px 30px 30px; }

.cv-facts {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px;
  background: var(--line); border: 1px solid var(--line); border-radius: 10px; overflow: hidden;
  margin-bottom: 22px;
}
.cv-facts > div { background: var(--surface-2); padding: 10px 14px; }
.cv-facts label { display: block; font-size: 9.5px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); font-weight: 600; }
.cv-facts b { font-size: 13.5px; font-weight: 700; margin-top: 3px; display: block; word-break: break-word; }

.cv-sec { margin-bottom: 20px; }
.cv-sec__h {
  display: flex; align-items: center; gap: 8px; margin: 0 0 11px;
  font-size: 13px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase;
  color: var(--blue); padding-bottom: 7px; border-bottom: 2px solid var(--blue-50);
  break-after: avoid;
}
.cv-sec__h svg { color: var(--magenta); }
.cv-summary { margin: 0; font-size: 13px; line-height: 1.7; color: #3a342d; text-align: justify; }

.cv-timeline { display: flex; flex-direction: column; gap: 15px; }
.cv-worktable { width: 100%; border-collapse: collapse; table-layout: fixed; }
.cv-worktable th { padding: 0; text-align: left; font-weight: 400; }
.cv-worktable td { padding: 0 0 15px; vertical-align: top; }
.cv-worktable tbody tr:last-child td { padding-bottom: 0; }
.cv-tl { padding-left: 15px; border-left: 2.5px solid var(--blue-100); break-inside: avoid; }
.cv-tl__head { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; }
.cv-tl__head b { font-size: 14px; font-weight: 700; }
.cv-tl__period { font-size: 11px; color: var(--magenta-600); font-weight: 700; white-space: nowrap; display: inline-flex; align-items: center; gap: 7px; }
.cv-tl__dur { display: inline-block; font-size: 10px; font-weight: 700; color: var(--blue-600, #1d5fd0); background: var(--blue-50, #eef3fd); border: 1px solid var(--blue-100, #d4e0f7); border-radius: 999px; padding: 1px 7px; letter-spacing: .2px; }
.cv-tl__co { font-size: 12.5px; color: var(--ink-2); font-weight: 600; margin-top: 1px; }
.cv-tl ul { margin: 7px 0 0; padding-left: 17px; }
.cv-tl li { font-size: 12px; line-height: 1.55; color: #4a443c; margin-bottom: 3px; }

.cv-bullets { margin: 0; padding-left: 17px; }
.cv-bullets li { font-size: 12.5px; line-height: 1.6; color: #3a342d; margin-bottom: 6px; }
.cv-bullets--compact li { margin-bottom: 3px; font-size: 12px; }

.cv-edu { display: flex; justify-content: space-between; align-items: flex-start; gap: 14px; padding: 8px 0; border-bottom: 1px dashed var(--line); }
.cv-edu:last-child { border-bottom: none; }
.cv-edu b { font-size: 13.5px; }
.cv-edu__inst { font-size: 12px; color: var(--ink-2); margin-top: 1px; }
.cv-edu__right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; white-space: nowrap; }
.cv-gpa { font-size: 11px; font-weight: 700; color: var(--green); background: var(--green-50); padding: 1px 8px; border-radius: 999px; }

.cv-two { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
.cv-chips { display: flex; flex-wrap: wrap; gap: 7px; }
.cv-chips span { font-size: 11.5px; font-weight: 600; padding: 4px 11px; border-radius: 999px;
  background: var(--blue-50); color: var(--blue-700); }
.cv-chips--alt span { background: var(--magenta-50); color: var(--magenta-600); }

.cv-foot { margin-top: 22px; padding-top: 12px; border-top: 1px solid var(--line);
  font-size: 10px; color: var(--muted); text-align: center; }

/* CV preview wrapper (screen) */
.cv-viewport { background: #d9d4cd; padding: 32px 20px; min-height: calc(100vh - 64px); overflow: auto; }
.cv-toolbar {
  position: sticky; top: 0; z-index: 30; background: var(--surface);
  border-bottom: 1px solid var(--line); padding: 12px 28px;
  display: flex; align-items: center; justify-content: space-between; gap: 14px;
}

/* ---------- PRINT ---------- */
@media print {
  @page { size: A4; margin: 0; }
  body { background: #fff !important; }
  .sidebar, .topbar, .cv-toolbar, .twk-panel, .toast, .no-print { display: none !important; }
  .cv-viewport { background: #fff !important; padding: 0 !important; min-height: 0 !important; overflow: visible !important; }
  .cv-page { box-shadow: none !important; margin: 0 !important; width: 100% !important;
    min-height: auto !important; overflow: visible !important; }
  .cv-head { overflow: hidden; }
  .cv-body { padding: 22px 30px 30px !important; }
  .cv-tl, .cv-edu { break-inside: avoid; }
  .cv-sec { break-inside: auto; }
  .cv-sec__h { break-after: avoid; }

  .cv-worktable thead { display: table-header-group; }

  .cv-head { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
}

.bar-track--stack { display: flex; align-items: stretch; }

.legend__item { display: inline-flex; align-items: center; gap: 7px; font-size: 12.5px; font-weight: 600; color: var(--ink-2); }
